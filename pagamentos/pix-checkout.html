<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento PIX - AgendaFacil</title>
    <link rel="icon" width="822" href="assets/img/LogoAgendaFacil.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .card-pix {
            background: #161616;
            border: 1px solid #262626;
        }

        .gradient-cyan {
            background: linear-gradient(135deg, #22d3ee, #0891b2);
        }

        .qr-container {
            background: white;
            padding: 15px;
            border-radius: 2rem;
        }
    </style>
</head>

<body class="p-6 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full card-pix p-8 rounded-[3rem] shadow-2xl text-center border border-white/5">
        <header class="mb-8">
            <h1 class="text-2xl font-900 italic tracking-tighter uppercase">
                Pagamento <span class="text-cyan-400">PIX</span>
            </h1>
            <p class="text-[9px] text-neutral-500 font-black uppercase tracking-[0.4em] mt-2 italic">Aprovação em
                Segundos</p>
        </header>

        <div
            class="qr-container mx-auto w-64 h-64 flex items-center justify-center shadow-[0_0_50px_rgba(34,211,238,0.15)]">
            <img id="qr-code-img" src="/assets/img/QRcodeAgendaFacil.png" alt="QR Code PIX"
                class="w-full h-full object-contain">
        </div>

        <div class="mt-8 space-y-6">
            <div>
                <p class="text-[10px] text-neutral-500 font-black uppercase tracking-widest mb-3">Pix Copia e Cola</p>
                <div class="relative">
                    <input id="pix-copy-paste" readonly=""
                        class="w-full bg-black/40 border border-white/5 p-4 rounded-2xl text-[10px] font-mono text-neutral-400 outline-none pr-12">
                    <button onclick="copiarPix()"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-cyan-400 hover:text-white transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="bg-cyan-400/5 border border-cyan-400/10 p-5 rounded-[2rem]">
                <h1 class="text-[12px] text-cyan-400 font-black uppercase tracking-[0.2em] mb-1">Me mande o pagamento
                    nesse mesmo numero</h1>
                <p class="text-xs text-neutral-400"><span class="text-red-500 font-bold">IMPORTANTE:</span> ME INFORME
                    NESSE EMAIL SEU NOME E COMPROVANTE</p>
                <p class="text-xs text-neutral-400"><span
                        class="text-red-500 font-bold">agendafacil.buzz@gmail.com</span></p>
            </div>
            <br>
            <!-- <div class="bg-cyan-400/5 border border-cyan-400/10 p-5 rounded-[2rem]">
                <p class="text-[9px] text-cyan-400 font-black uppercase tracking-[0.2em] mb-1">Aguardando Pagamento</p>
                <p class="text-xs text-neutral-400">Após pagar, seu acesso será liberado <br> automaticamente em até 1
                    minuto.</p>
            </div> -->

            <a href='https://agendafacil.buzz/confirmAssinatura.html' target="_blank">
                <button
                    class="gradient-cyan w-full py-5 rounded-[2rem] text-black font-900 uppercase text-xs tracking-[0.2em] active:scale-95 transition-all shadow-xl shadow-cyan-500/10">
                    Já realizei o pagamento
                </button>
            </a>

            <p class="text-[8px] text-neutral-700 font-black uppercase tracking-widest">
                O código expira em <span id="timer" class="text-neutral-500">30:00</span>
            </p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCppcnfUc5N4xuWq0UUmg6_idNLY8vRQdw",
            authDomain: "agendafacil-1.firebaseapp.com",
            projectId: "agendafacil-1",
            storageBucket: "agendafacil-1.firebasestorage.app",
            messagingSenderId: "862585496599",
            appId: "1:862585496599:web:2a360f1147a334d1342852"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const qrBase64 = params.get('qr');

        // CAPTURANDO OS DADOS DO PLANO DA URL
        const userId = params.get('uid');
        const planoEscolhido = params.get('plan'); // Captura o nome do plano
        const valorPago = params.get('amount');     // Captura '30.90' ou '90.90'

        // CORES E CHAVES FIXAS PARA CADA PLANO
        // ⚠️ SUBSTITUA a string do plano PRO pelo seu código Pix copia e cola real de R$ 30,90
        const pixPro30 = "00020126840014BR.GOV.BCB.PIX0136ea8fd492-f9d7-4d6b-816c-15661a2720a90222Agenda Fácil Plano Pro520400005303986540530.905802BR5925Elli Junior Santos de Jes6009SAO PAULO62140510qTxvKz701R630406CB";
        const pixPremium90 = "00020126880014BR.GOV.BCB.PIX013656771fc7-5557-409b-bb6f-9e3f99fda9320226Agenda Fácil Plano Premiun520400005303986540590.905802BR5925Elli Junior Santos de Jes6009SAO PAULO62140510Uj92ajGCQU63044952";

        let copyPasteFinal = "";

        // Define qual código Pix usar com base no valor vindo da URL
        if (valorPago === "30.90" || (planoEscolhido && planoEscolhido.toLowerCase().trim() === "pro")) {
            copyPasteFinal = pixPro30;
            document.getElementById('qr-code-img').src = "assets/img/payQRcode-planoPro.png"; // Imagem para R$ 30,90
        } else {
            copyPasteFinal = pixPremium90;
            document.getElementById('qr-code-img').src = "assets/img/payQRcode-planoPremium.png"; // Imagem padrão R$ 90,90
        }
        // Se o seu backend enviar o Pix dinamicamente via parâmetro 'copy' na URL, ele usará o da URL prioritariamente
        const copyFromUrl = params.get('copy');
        if (copyFromUrl) copyPasteFinal = copyFromUrl;

        // 1. Renderiza os dados corretos na tela
        if (qrBase64) document.getElementById('qr-code-img').src = `data:image/png;base64,${qrBase64}`;
        if (copyPasteFinal) document.getElementById('pix-copy-paste').value = copyPasteFinal;

        // 2. O "VIGILANTE" DO BANCO DE DADOS
        if (userId) {
            console.log(`👀 Monitorando ativação para o usuário: ${userId} no plano: ${planoEscolhido}`);

            const unsub = onSnapshot(doc(db, "perfis", userId), (docSnap) => {
                if (docSnap.exists()) {
                    const dados = docSnap.data();

                    // Quando o pagamento for aprovado
                    if (dados.statusPagamento === 'ativo') {
                        unsub();
                        alert(`Pagamento do plano ${planoEscolhido || ""} Recebido! Seu acesso foi liberado.`);
                        window.location.href = "index.html";
                    }
                }
            });
        }

        // Timer de 30 min
        let tempo = 1800;
        const timerElement = document.getElementById('timer');
        setInterval(() => {
            const min = Math.floor(tempo / 60);
            const sec = tempo % 60;
            if (timerElement) {
                timerElement.innerText = `${min}:${sec < 10 ? '0' + sec : sec}`;
            }
            if (tempo > 0) tempo--;
        }, 1000);

        // Função Copiar (Escopo Global Garantido)
        window.copiarPix = () => {
            const copyText = document.getElementById("pix-copy-paste");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("Código PIX copiado! 🚀");
        };
    </script>
</body>

</html>
