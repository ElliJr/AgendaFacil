<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento PIX - AgendaFacil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Inter', sans-serif; }
        .card-pix { background: #161616; border: 1px solid #262626; }
        .gradient-cyan { background: linear-gradient(135deg, #22d3ee, #0891b2); }
        .qr-container { background: white; padding: 15px; border-radius: 2rem; }
    </style>
</head>
<body class="p-6 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full card-pix p-8 rounded-[3rem] shadow-2xl text-center border border-white/5">
        <header class="mb-8">
            <h1 class="text-2xl font-900 italic tracking-tighter uppercase">
                Pagamento <span class="text-cyan-400">PIX</span>
            </h1>
            <p class="text-[9px] text-neutral-500 font-black uppercase tracking-[0.4em] mt-2 italic">Aprovação em Segundos</p>
        </header>

        <div class="qr-container mx-auto w-64 h-64 flex items-center justify-center shadow-[0_0_50px_rgba(34,211,238,0.15)]">
            <img id="qr-code-img" src="" alt="QR Code PIX" class="w-full h-full object-contain">
        </div>

        <div class="mt-8 space-y-6">
            <div>
                <p class="text-[10px] text-neutral-500 font-black uppercase tracking-widest mb-3">Pix Copia e Cola</p>
                <div class="relative">
                    <input id="pix-copy-paste" readonly 
                        class="w-full bg-black/40 border border-white/5 p-4 rounded-2xl text-[10px] font-mono text-neutral-400 outline-none pr-12">
                    <button onclick="copiarPix()" class="absolute right-3 top-1/2 -translate-y-1/2 text-cyan-400 hover:text-white transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="bg-cyan-400/5 border border-cyan-400/10 p-5 rounded-[2rem]">
                <p class="text-[9px] text-cyan-400 font-black uppercase tracking-[0.2em] mb-1">Aguardando Pagamento</p>
                <p class="text-xs text-neutral-400">Após pagar, seu acesso será liberado <br> automaticamente em até 1 minuto.</p>
            </div>

            <button onclick="window.location.href='.html'" 
                class="gradient-cyan w-full py-5 rounded-[2rem] text-black font-900 uppercase text-xs tracking-[0.2em] active:scale-95 transition-all shadow-xl shadow-cyan-500/10">
                Já realizei o pagamento
            </button>

            <p class="text-[8px] text-neutral-700 font-black uppercase tracking-widest">
                O código expira em <span id="timer" class="text-neutral-500">30:00</span>
            </p>
        </div>
    </div>

    <script>
        // Pega os dados da URL (vêm da sua tela de pagamento anterior)
        const params = new URLSearchParams(window.location.search);
        const qrBase64 = params.get('qr');
        const copyPaste = params.get('copy');

        // Renderiza o QR Code (Mercado Pago geralmente manda em Base64 ou URL)
        if (qrBase64) {
            // Se o MP mandar a string base64 pura, montamos o prefixo
            document.getElementById('qr-code-img').src = qrBase64.startsWith('data:') ? qrBase64 : `data:image/png;base64,${qrBase64}`;
        }
        
        if (copyPaste) {
            document.getElementById('pix-copy-paste').value = copyPaste;
        }

        // Função de Copiar
        function copiarPix() {
            const copyText = document.getElementById("pix-copy-paste");
            copyText.select();
            copyText.setSelectionRange(0, 99999); // Para mobile
            navigator.clipboard.writeText(copyText.value);
            
            alert("Código PIX copiado! 🚀");
        }

        // Timer simples de 30 min
        let tempo = 1800;
        const timerElement = document.getElementById('timer');
        setInterval(() => {
            const min = Math.floor(tempo / 60);
            const sec = tempo % 60;
            timerElement.innerText = `${min}:${sec < 10 ? '0' + sec : sec}`;
            if (tempo > 0) tempo--;
        }, 1000);
    </script>
</body>
</html>
